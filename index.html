<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Original3DArt</title>
    <style>
        body {
            margin: 0;
            background: black;
            display: flex;
            justify-content: center;
        }

        .site {
            position: relative;
            width: 1024px;
            height: 1536px;
            background: url('vikingsite.jpg') no-repeat center/cover;
        }

        /* Общие настройки для всех кликабельных областей */
        .click {
            position: absolute;
            cursor: pointer;
            background-size: cover; /* чтобы картинка заполнила квадрат */
            background-position: center;
            border: none;
        }

        /* Координаты и картинки для 4 фото */
        .img1 { top: 600px; left: 140px; width: 180px; height: 180px; background-image: url('img1.jpg'); }
        .work2 { top: 600px; left: 340px; width: 180px; height: 180px; background-image: url('work2.jpg'); }
        .img3 { top: 600px; left: 540px; width: 180px; height: 180px; background-image: url('img3.jpg'); }
        .work4 { top: 600px; left: 740px; width: 180px; height: 180px; background-image: url('work4.jpg'); }

        /* Кнопка GO */
        .go {
            top: 860px;
            left: 620px;
            width: 200px;
            height: 70px;
        }

        /* Окно предпросмотра (зум) */
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .popup img {
            max-width: 90%;
            max-height: 90%;
            border: 2px solid #555;
        }
    </style>
</head>
<body>

<div class="site">
    <!-- Добавлены классы для отображения картинок -->
    <div class="click img1" onclick="openImg('img1.jpg')"></div>
    <div class="click work2" onclick="openImg('work2.jpg')"></div>
    <div class="click img3" onclick="openImg('img3.jpg')"></div>
    <div class="click img4" onclick="openImg('img4.jpg')"></div>

    <div class="click go" onclick="goPage()"></div>
</div>

<!-- Окно для увеличения -->
<div class="popup" id="popup" onclick="closeImg()">
    <img id="bigImg" src="" alt="Увеличенное фото">
</div>

<script>
    function openImg(src){
        document.getElementById('popup').style.display='flex';
        document.getElementById('bigImg').src=src;
    }

    function closeImg(){
        document.getElementById('popup').style.display='none';
    }

    function goPage(){
        window.location.href = "models.html";
    }
</script>

</body>
</html>
