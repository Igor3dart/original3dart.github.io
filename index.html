<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORIGINAL3DART</title>

<style>

body{
margin:0;
background:black;
font-family:serif;
display:flex;
justify-content:center;
}

/* фон страницы */

.page{
width:900px;
background:url("vikingsite.jpg") no-repeat top center;
background-size:contain;
padding-top:420px;
}

/* галерея */

.gallery{
width:720px;
margin:auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
padding-top:40px;
}

.gallery img{

width:100%;
height:150px;
object-fit:cover;

border-radius:8px;

cursor:pointer;

transition:0.3s;

}

.gallery img:hover{
transform:scale(1.05);
}

/* увеличение */

.lightbox{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.95);

display:none;

align-items:center;

justify-content:center;

}

.lightbox img{

max-width:90%;
max-height:90%;

}

footer{

text-align:center;
color:#c7b299;

padding:60px;

font-size:14px;

}

</style>
</head>

<body>

<div class="page">

<div class="gallery">

<img src="work1.jpg" onclick="openImg(this.src)">
<img src="work2.jpg" onclick="openImg(this.src)">
<img src="work3.jpg" onclick="openImg(this.src)">
<img src="work4.jpg" onclick="openImg(this.src)">

<img src="work5.jpg" onclick="openImg(this.src)">
<img src="work6.jpg" onclick="openImg(this.src)">
<img src="work7.jpg" onclick="openImg(this.src)">
<img src="work8.jpg" onclick="openImg(this.src)">

</div>

<footer>
© 2026 Igor Handmade
</footer>

</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightimg">
</div>

<script>

function openImg(src){

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightimg").src=src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
