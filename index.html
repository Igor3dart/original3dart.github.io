<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORIGINAL3DART</title>

<style>

body{
margin:0;
background:black;
display:flex;
justify-content:center;
font-family:serif;
}

/* основной блок */

.page{

width:900px;
height:1400px;

background:url("vikingsite.jpg") no-repeat top center;
background-size:contain;

position:relative;

}

/* галерея */

.gallery{

position:absolute;

top:520px;
left:50%;
transform:translateX(-50%);

width:700px;

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

}

/* картинки */

.gallery img{

width:100%;
height:130px;

object-fit:cover;

border-radius:6px;

cursor:pointer;

transition:0.3s;

box-shadow:0 0 10px rgba(0,0,0,0.7);

}

.gallery img:hover{

transform:scale(1.05);

}

/* увеличение */

.lightbox{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.95);

display:none;

align-items:center;

justify-content:center;

}

.lightbox img{

max-width:90%;
max-height:90%;

}

</style>

</head>

<body>

<div class="page">

<div class="gallery">

<img src="work1.jpg" onclick="openImg(this.src)">
<img src="work2.jpg" onclick="openImg(this.src)">
<img src="work3.jpg" onclick="openImg(this.src)">
<img src="work4.jpg" onclick="openImg(this.src)">

<img src="work5.jpg" onclick="openImg(this.src)">
<img src="work6.jpg" onclick="openImg(this.src)">
<img src="work7.jpg" onclick="openImg(this.src)">
<img src="work8.jpg" onclick="openImg(this.src)">

</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightimg">
</div>

<script>

function openImg(src){

document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=src;

}

function closeImg(){

document.getElementById("lightbox").style.display="none";

}

</script>

</body>
</html>
