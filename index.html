<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORIGINAL3DART</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
font-family:'Cinzel', serif;
display:flex;
justify-content:center;
}

.container{
width:900px;
min-height:1400px;
background:url("vikingsite.jpg") no-repeat top center;
background-size:cover;
position:relative;
}

/* заголовок */

.section-title{
text-align:center;
color:#d8c8a8;
font-size:34px;
margin-top:420px;
margin-bottom:30px;
letter-spacing:2px;
text-shadow:0 0 10px black;
}

.section-title:before,
.section-title:after{
content:"";
display:block;
width:260px;
height:2px;
background:#7a6a50;
margin:10px auto;
}

/* галерея */

.gallery{
width:720px;
margin:auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.gallery img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.8);
}

.gallery img:hover{
transform:scale(1.05);
}

/* нижний заголовок */

.bottom-title{
text-align:center;
margin-top:40px;
color:#d8c8a8;
font-size:32px;
letter-spacing:2px;
text-shadow:0 0 10px black;
}

.bottom-title:before,
.bottom-title:after{
content:"";
display:block;
width:260px;
height:2px;
background:#7a6a50;
margin:10px auto;
}

/* увеличение фото */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

.footer{
text-align:center;
color:#b8a98c;
margin-top:280px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<div class="section-title">
Новые модели
</div>

<div class="gallery">

<img src="work1.jpg" onclick="openImg(this.src)">
<img src="work2.jpg" onclick="openImg(this.src)">
<img src="work3.jpg" onclick="openImg(this.src)">
<img src="work4.jpg" onclick="openImg(this.src)">

</div>

<div class="bottom-title">
Все модели
</div>

<div class="footer">
© 2026 Igor Handmade
</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightimg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
