<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Original3Dart</title>

<style>
body{
margin:0;
background:#111;
font-family:serif;
display:flex;
justify-content:center;
}

.page{
width:1200px;
background:url("vikingsite.jpg") center top no-repeat;
background-size:cover;
padding-bottom:120px;
}

.header{
text-align:center;
padding-top:120px;
padding-bottom:60px;
color:#d6c3a1;
}

.header h1{
font-size:64px;
margin:0;
letter-spacing:3px;
}

.subtitle{
margin-top:10px;
font-size:18px;
}

.section-title{
text-align:center;
color:#d6c3a1;
font-size:38px;
margin-top:60px;
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,260px);
gap:30px;
justify-content:center;
}

.item img{
width:260px;
height:260px;
object-fit:cover;
border:4px solid #3b2e22;
}

.allmodels{
text-align:center;
margin-top:70px;
color:#d6c3a1;
font-size:38px;
}

.button{
margin-top:10px;
display:inline-block;
padding:12px 30px;
border:2px solid #c8a97e;
color:#c8a97e;
text-decoration:none;
font-size:20px;
transition:0.3s;
}

.button:hover{
background:#c8a97e;
color:black;
}

.footer{
text-align:center;
margin-top:120px;
color:#c8a97e;
font-size:16px;
}
</style>
</head>

<body>

<div class="site">

<div class="header">
<h1>ORIGINAL3DART</h1>
<div class="subtitle">
Украшения ручной работы | Бронза | Камни | Эмаль
</div>
</div>

<div class="section-title">
Новые модели
</div>

<div class="grid">
<div class="item"><img src="img/1.jpg"></div>
<div class="item"><img src="img/2.jpg"></div>
<div class="item"><img src="img/3.jpg"></div>
<div class="item"><img src="img/4.jpg"></div>
</div>

<div class="allmodels">
Все модели
<br>
<a class="button" href="models.html">Здесь</a>
</div>

<div class="footer">
© 2025 Igor Handmade
</div>

</div>

</body>
</html>
