<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Original3Dart</title>
  <style>
    body {
      margin: 0;
      font-family: 'Times New Roman', serif;
      background: url('[i.ibb.co](https://i.ibb.co/5G6vRzJ/texture.jpg)') no-repeat center center fixed;
      background-size: cover;
      color: #e0cfa9;
      text-align: center;
    }

    header {
      background: rgba(0, 0, 0, 0.7);
      padding: 30px 10px;
      border-bottom: 2px solid #3a2a14;
    }

    h1 {
      font-size: 42px;
      margin: 0;
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    p.subtitle {
      margin: 10px 0 0;
      font-size: 16px;
      color: #caa96b;
    }

    .section-title {
      margin: 40px 0 20px;
      font-size: 28px;
      text-shadow: 1px 1px 2px #000;
    }

    .gallery {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 20px;
      padding: 0 20px;
    }

    .gallery img {
      border: 2px solid #7a5f37;
      border-radius: 10px;
      width: 150px;
      height: 150px;
      object-fit: cover;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 215, 150, 0.7);
    }

    /* Модальное окно */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0, 0, 0, 0.9);
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      max-width: 90%;
      max-height: 90%;
      border: 4px solid #8b6c3a;
      border-radius: 10px;
    }

    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      color: #f8e8c0;
      font-size: 40px;
      cursor: pointer;
      transition: color 0.3s;
    }

    .close:hover {
      color: #ffcc66;
    }

    footer {
      margin-top: 40px;
      padding: 30px 10px;
      font-size: 14px;
      color: #b59461;
      border-top: 1px solid #3a2a14;
      background-color: rgba(0, 0, 0, 0.6);
    }
  </style>
</head>
<body>

  <header>
    <h1>ORIGINAL3DART</h1>
    <p class="subtitle">Украшения ручной работы | Бронза | Камни | Эмаль</p>
  </header>

  <section>
    <h2 class="section-title">Новые модели</h2>
    <div class="gallery">
      <img src="[i.ibb.co](https://i.ibb.co/6njC1nY/model1.jpg)" alt="Модель 1">
      <img src="[i.ibb.co](https://i.ibb.co/hDx2kSR/model2.jpg)" alt="Модель 2">
      <img src="[i.ibb.co](https://i.ibb.co/vw7TtTX/model3.jpg)" alt="Модель 3">
      <img src="[i.ibb.co](https://i.ibb.co/YPRk0HM/model4.jpg)" alt="Модель 4">
    </div>
  </section>

  <section>
    <h2 class="section-title">Все модели</h2>
    <p>Скоро доступно...</p>
  </section>

  <footer>
    <p>© 2025 Igor Handmade</p>
  </footer>

  <!-- Модальное окно -->
  <div id="modal" class="modal">
    <span class="close">&times;</span>
    <img class="modal-content" id="modal-img">
  </div>

  <script>
    const modal = document.getElementById("modal");
    const modalImg = document.getElementById("modal-img");
    const closeBtn = document.getElementsByClassName("close")[0];
    const images = document.querySelectorAll(".gallery img");

    images.forEach(img => {
      img.addEventListener("click", () => {
        modal.style.display = "flex";
        modalImg.src = img.src;
      });
    });

    closeBtn.addEventListener("click", () => {
      modal.style.display = "none";
    });

    modal.addEventListener("click", (e) => {
      if (e.target === modal) modal.style.display = "none";
    });
  </script>

</body>
</html>
