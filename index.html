<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORIGINAL3DART</title>

<style>

body{
margin:0;
font-family:serif;
color:white;
text-align:center;
background:black;
}

/* верхняя картинка */

.hero{
background-image:url("vikingsite.jpg");
background-size:contain;
background-repeat:no-repeat;
background-position:center top;
height:900px;
}

/* галерея */

.gallery{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

/* увеличение картинки */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

footer{
padding:40px;
font-size:14px;
color:#aaa;
}

</style>
</head>

<body>

<div class="hero"></div>

<h2>My Works</h2>

<div class="gallery">

<img src="work1.jpg" onclick="openImg(this.src)">
<img src="work2.jpg" onclick="openImg(this.src)">
<img src="work3.jpg" onclick="openImg(this.src)">
<img src="work4.jpg" onclick="openImg(this.src)">

</div>

<footer>

<p>Handcrafted Celtic & Viking Jewelry</p>
<p>© ORIGINAL3DART</p>

</footer>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightimg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
