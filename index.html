<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Original3DArt</title>

<style>
body {
    margin: 0;
    background: black;
    display: flex;
    justify-content: center;
}

.site {
    position: relative;
    width: 1024px;
    height: 1536px;
    background: url('vikingsite.jpg') no-repeat center/cover;
}

/* зоны клика */
.click {
    position: absolute;
    cursor: pointer;
}

/* координаты 4 фото */
.img1 { top: 600px; left: 140px; width: 180px; height: 180px; }
.work2 { top: 600px; left: 340px; width: 180px; height: 180px; }
.img3 { top: 600px; left: 540px; width: 180px; height: 180px; }
.img4 { top: 600px; left: 740px; width: 180px; height: 180px; }

/* кнопка GO */
.go {
    top: 860px;
    left: 620px;
    width: 200px;
    height: 70px;
}

/* увеличение */
.popup {
    display: none;
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
}

.popup img {
    max-width: 90%;
    max-height: 90%;
}

</style>
</head>

<body>

<div class="site">

    <div class="click img1" onclick="openImg('img1.jpg')"></div>
    <div class="click work2" onclick="openImg('work2.jpg')"></div>
    <div class="click img3" onclick="openImg('img3.jpg')"></div>
    <div class="click img4" onclick="openImg('img4.jpg')"></div>

    <div class="click go" onclick="goPage()"></div>

</div>

<div class="popup" id="popup" onclick="closeImg()">
    <img id="bigImg">
</div>

<script>
function openImg(src){
    document.getElementById('popup').style.display='flex';
    document.getElementById('bigImg').src=src;
}

function closeImg(){
    document.getElementById('popup').style.display='none';
}

function goPage(){
    window.location.href = "models.html";
}
</script>

</body>
</html>
