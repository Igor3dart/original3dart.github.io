<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ORIGINAL3DART</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
color:white;
text-align:center;

background-image:url("cover.jpg");
background-size:cover;
background-position:center;
background-attachment:scroll;
}

header{
padding:120px 20px;
background:rgba(0,0,0,0.6);
}

h1{
font-size:60px;
letter-spacing:4px;
margin:0;
}

h2{
margin-top:60px;
font-size:34px;
}

section{
max-width:1200px;
margin:auto;
padding:40px 20px;
background:rgba(0,0,0,0.6);
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
}

footer{
padding:30px;
background:rgba(0,0,0,0.8);
margin-top:40px;
}

</style>
</head>

<body>

<header>
<h1>ORIGINAL3DART</h1>
<p>Handcrafted Celtic & Viking Jewelry</p>
</header>

<section>

<h2>Gallery</h2>

<div class="gallery">

<img src="work1.jpg" onclick="openImg(this.src)">
<img src="work2.jpg" onclick="openImg(this.src)">
<img src="work3.jpg" onclick="openImg(this.src)">
<img src="work4.jpg" onclick="openImg(this.src)">

</div>

</section>

<footer>

<p>Contact: your@email.com</p>
<p>© ORIGINAL3DART</p>

</footer>

<div class="lightbox" id="lightbox" onclick="closeImg()">
<img id="lightimg">
</div>

<script>

function openImg(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightimg").src=src;
}

function closeImg(){
document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
